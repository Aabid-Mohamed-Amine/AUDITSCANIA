<body class="bg-background text-on-surface font-body-md overflow-hidden selection:bg-secondary-fixed selection:text-on-secondary-fixed">
<!-- Background Layer -->

<div class="absolute inset-0 opacity-10">

<!-- Main Authentication Shell -->

<p class="font-code-md text-label-caps text-on-surface-variant mt-2 tracking-widest uppercase">Secure Command Access</p>
</div>
<!-- Login Card -->
<div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-8 shadow-xl relative backdrop-blur-md">
<!-- Decorative Corner Accents -->
<div class="absolute top-0 left-0 w-4 h-4 border-t-2 border-l-2 border-secondary/20 rounded-tl-xl -translate-x-1 -translate-y-1"></div>
<div class="absolute bottom-0 right-0 w-4 h-4 border-b-2 border-r-2 border-secondary/20 rounded-br-xl translate-x-1 translate-y-1"></div>

<script>
    // Matrix Background Effect (Adapted for Light Theme via CSS Filter)
    const canvas = document.getElementById('matrix-canvas');
    const ctx = canvas.getContext('2d');

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789$@%&*";
    const fontSize = 16;
    const columns = canvas.width / fontSize;
    const drops = [];

    for (let x = 0; x < columns; x++) {
        drops[x] = 1;
    }

    function drawMatrix() {
        // Use background color for trail
        ctx.fillStyle = "rgba(249, 249, 255, 0.1)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = "#0051d5";
        ctx.font = fontSize + "px monospace";

        for (let i = 0; i < drops.length; i++) {
            const text = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
            ctx.fillText(text, i * fontSize, drops[i] * fontSize);

            if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                drops[i] = 0;
            }
            drops[i]++;
        }
    }

    setInterval(drawMatrix, 50);

    // Resize handler
    window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    });

    // Form Submission Simulation
    const loginForm = document.getElementById('login-form');
    const statusDisplay = document.getElementById('status-display');
    const s1 = document.getElementById('status-line-1');
    const s2 = document.getElementById('status-line-2');

    loginForm.addEventListener('submit', (e) => {
        e.preventDefault();
        statusDisplay.classList.remove('hidden');
        
        setTimeout(() => {
            s1.classList.remove('opacity-0');
            s1.classList.add('opacity-100');
        }, 200);

        setTimeout(() => {
            s2.classList.remove('opacity-0');
            s2.classList.add('opacity-100');
        }, 800);

        // Mock Success Redirect
        setTimeout(() => {
            document.body.classList.add('opacity-0', 'transition-opacity', 'duration-1000');
            console.log("Authentication Successful. Redirecting to Dashboard...");
        }, 2000);
    });

    // Password Visibility Toggle
    const toggleBtn = document.getElementById('toggle-password');
    const passInput = document.getElementById('password');
    let visible = false;

    toggleBtn.addEventListener('click', () => {
        visible = !visible;
        passInput.type = visible ? 'text' : 'password';
        toggleBtn.querySelector('span').innerText = visible ? 'visibility_off' : 'visibility';
    });
</script>
