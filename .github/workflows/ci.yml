name: CI/CD Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ghcr.io/${{ github.repository_owner }}/auditscan-backend
  IMAGE_FRONTEND: ghcr.io/${{ github.repository_owner }}/auditscan-frontend
  IMAGE_NMAP: ghcr.io/${{ github.repository_owner }}/auditscan-nmap
  IMAGE_NUCLEI: ghcr.io/${{ github.repository_owner }}/auditscan-nuclei
  IMAGE_ZAP: ghcr.io/${{ github.repository_owner }}/auditscan-zap

jobs:
  # ------------------------------------------------------------------ #
  #  Backend — pytest                                                    #
  # ------------------------------------------------------------------ #
  test-backend:
    name: Backend Tests (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: sqlite:///./test.db
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: ci-test-secret-key-not-for-production
      SHODAN_API_KEY: dummy
      VIRUSTOTAL_API_KEY: dummy
      ABUSEIPDB_API_KEY: dummy

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt pytest httpx

      - name: Run tests
        run: pytest tests/ -v --tb=short

  # ------------------------------------------------------------------ #
  #  Frontend — ESLint                                                   #
  # ------------------------------------------------------------------ #
  test-frontend:
    name: Frontend Lint (ESLint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run ESLint
        run: npm run lint

  # ------------------------------------------------------------------ #
  #  Build & Push Docker Images to GHCR                                 #
  # ------------------------------------------------------------------ #
  build-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ---- Backend -------------------------------------------------- #
      - name: Extract metadata — backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BACKEND }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      # ---- Frontend ------------------------------------------------- #
      - name: Extract metadata — frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_FRONTEND }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

      # ---- Nmap sidecar --------------------------------------------- #
      - name: Extract metadata — nmap
        id: meta-nmap
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NMAP }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push nmap
        uses: docker/build-push-action@v6
        with:
          context: ./nmap
          push: true
          tags: ${{ steps.meta-nmap.outputs.tags }}
          labels: ${{ steps.meta-nmap.outputs.labels }}
          cache-from: type=gha,scope=nmap
          cache-to: type=gha,scope=nmap,mode=max

      # ---- Nuclei --------------------------------------------------- #
      - name: Extract metadata — nuclei
        id: meta-nuclei
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NUCLEI }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push nuclei
        uses: docker/build-push-action@v6
        with:
          context: ./nuclei
          push: true
          tags: ${{ steps.meta-nuclei.outputs.tags }}
          labels: ${{ steps.meta-nuclei.outputs.labels }}
          cache-from: type=gha,scope=nuclei
          cache-to: type=gha,scope=nuclei,mode=max

      # ---- ZAP ------------------------------------------------------ #
      - name: Extract metadata — zap
        id: meta-zap
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_ZAP }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push zap
        uses: docker/build-push-action@v6
        with:
          context: ./zap
          push: true
          tags: ${{ steps.meta-zap.outputs.tags }}
          labels: ${{ steps.meta-zap.outputs.labels }}
          cache-from: type=gha,scope=zap
          cache-to: type=gha,scope=zap,mode=max

  # ------------------------------------------------------------------ #
  #  Deploy to Production (main branch only)                            #
  # ------------------------------------------------------------------ #
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-push]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Check deploy secrets
        id: guard
        run: |
          if [ -n "${{ secrets.DEPLOY_HOST }}" ]; then
            echo "ready=true" >> $GITHUB_OUTPUT
          else
            echo "ready=false" >> $GITHUB_OUTPUT
            echo "::warning::DEPLOY_HOST secret not set — skipping deployment"
          fi

      - name: Deploy via SSH
        if: steps.guard.outputs.ready == 'true'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: 22
          script: |
            set -e

            IMAGE_TAG="sha-$(echo '${{ github.sha }}' | cut -c1-7)"
            export IMAGE_TAG
            export REGISTRY_OWNER="${{ github.repository_owner }}"

            cd ${{ secrets.DEPLOY_PATH }}

            echo "${{ secrets.GHCR_TOKEN }}" | \
              docker login ghcr.io -u "${REGISTRY_OWNER}" --password-stdin

            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f

            echo "✓ Deployed ${IMAGE_TAG}"
