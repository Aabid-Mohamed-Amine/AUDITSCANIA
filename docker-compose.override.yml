# ============================================================
# Dev override — monte le code source en volume (hot code).
# Compose le fusionne automatiquement avec docker-compose.yml.
#
# Avantage : modifier un .py local → `docker compose restart <svc>`
#            applique le changement SANS rebuild d'image.
#
# Le backend tourne avec --reload : l'API se recharge toute seule.
# Les workers/scanners nécessitent un `restart` (process non auto-reload).
#
# Pour revenir au comportement normal : supprimer ce fichier
# (ou `docker compose -f docker-compose.yml up -d` pour l'ignorer).
# ============================================================

services:

  # ── Backend API (hot reload) ──────────────────────────────────────────────
  backend:
    volumes:
      - ./backend:/app
    command: >
      uvicorn app.main:app
      --host 0.0.0.0 --port 8000
      --reload

  # ── Celery workers — code monté, restart pour appliquer ───────────────────
  worker:
    volumes:
      - ./backend:/app

  worker-slow:
    volumes:
      - ./backend:/app

  beat:
    volumes:
      - ./backend:/app

  flower:
    volumes:
      - ./backend:/app

  # ── Scanners — code Python monté ──────────────────────────────────────────
  ffuf:
    volumes:
      - ./ffuf:/app

  sqlmap:
    volumes:
      - ./sqlmap:/app

  nuclei:
    volumes:
      - ./nuclei:/app

  zap:
    volumes:
      - ./zap:/app

  # ── Frontend — mode dev Next.js (hot reload) ──────────────────────────────
  # On cible le stage `deps` (node_modules Alpine déjà installés) et on monte
  # le code source. Le volume anonyme /app/node_modules préserve les modules
  # du conteneur (évite le conflit avec les node_modules Windows de l'hôte).
  # WATCHPACK_POLLING : file-watching fiable sur volumes Docker/Windows.
  frontend:
    build:
      target: deps
    command: sh -c "npm run dev"
    environment:
      INTERNAL_API_URL: http://backend:8000
      HOSTNAME: "0.0.0.0"
      PORT: "3000"
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./frontend:/app
      - /app/node_modules
