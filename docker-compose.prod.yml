# Production — pulls pre-built images from GHCR.
# Usage: docker compose -f docker-compose.prod.yml up -d
#
# Required in .env on the server (no defaults — fails fast if missing):
#   REGISTRY_OWNER      GitHub username/org (e.g. DEVLOPPER17)
#   IMAGE_TAG           Short SHA injected by CI (e.g. sha-a1b2c3d)
#   POSTGRES_USER       DB user
#   POSTGRES_PASSWORD   DB password (strong)
#   POSTGRES_DB         DB name
#   REDIS_PASSWORD      Redis auth password (strong)
#   SECRET_KEY          JWT signing key (openssl rand -hex 32)
#   SHODAN_API_KEY      External API key
#   VIRUSTOTAL_API_KEY  External API key
#   ABUSEIPDB_API_KEY   External API key
#   NEXT_PUBLIC_API_URL Public URL of the API  (e.g. https://api.yourdomain.com)
#   NEXT_PUBLIC_WS_URL  Public WebSocket URL   (e.g. wss://api.yourdomain.com)
#   FRONTEND_URL        Public frontend URL    (e.g. https://yourdomain.com)

networks:
  auditscan_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  nuclei_templates:

services:
  # ------------------------------------------------------------------ #
  #  PostgreSQL                                                          #
  # ------------------------------------------------------------------ #
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - auditscan_net
    # No external port in production — internal only
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ------------------------------------------------------------------ #
  #  Redis (password-protected)                                          #
  # ------------------------------------------------------------------ #
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - auditscan_net
    # No external port in production — internal only
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ------------------------------------------------------------------ #
  #  Nuclei — vulnerability scanner microservice                        #
  # ------------------------------------------------------------------ #
  nuclei:
    image: ghcr.io/${REGISTRY_OWNER}/auditscan-nuclei:${IMAGE_TAG}
    restart: unless-stopped
    volumes:
      - nuclei_templates:/root/.local/nuclei-templates
    networks:
      - auditscan_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ------------------------------------------------------------------ #
  #  OWASP ZAP — web application scanner microservice                   #
  # ------------------------------------------------------------------ #
  zap:
    image: ghcr.io/${REGISTRY_OWNER}/auditscan-zap:${IMAGE_TAG}
    restart: unless-stopped
    networks:
      - auditscan_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ------------------------------------------------------------------ #
  #  Nmap — active scanner microservice                                  #
  # ------------------------------------------------------------------ #
  nmap:
    image: ghcr.io/${REGISTRY_OWNER}/auditscan-nmap:${IMAGE_TAG}
    restart: unless-stopped
    networks:
      - auditscan_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ------------------------------------------------------------------ #
  #  Backend API                                                         #
  # ------------------------------------------------------------------ #
  backend:
    image: ghcr.io/${REGISTRY_OWNER}/auditscan-backend:${IMAGE_TAG}
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - auditscan_net
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ------------------------------------------------------------------ #
  #  Celery Worker                                                       #
  # ------------------------------------------------------------------ #
  worker:
    image: ghcr.io/${REGISTRY_OWNER}/auditscan-backend:${IMAGE_TAG}
    restart: unless-stopped
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=4
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nmap:
        condition: service_healthy
      nuclei:
        condition: service_healthy
      zap:
        condition: service_healthy
    networks:
      - auditscan_net

  # ------------------------------------------------------------------ #
  #  Frontend                                                            #
  # ------------------------------------------------------------------ #
  frontend:
    image: ghcr.io/${REGISTRY_OWNER}/auditscan-frontend:${IMAGE_TAG}
    restart: unless-stopped
    env_file: .env
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - auditscan_net
    ports:
      - "3001:3000"

  # ------------------------------------------------------------------ #
  #  Reverse proxy — Traefik (optional, uncomment to enable)            #
  # ------------------------------------------------------------------ #
  # traefik:
