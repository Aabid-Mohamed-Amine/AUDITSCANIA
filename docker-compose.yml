# AuditScan IA — Professional SaaS Cybersecurity Platform
# Architecture: 14 microservices + 3 testing environments
#
# Usage:
#   docker compose up --build               → full stack
#   docker compose --profile testing up     → + OWASP Juice Shop, DVWA, WebGoat
#   docker compose up backend worker        → API only

networks:
  auditscan_net:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.100.0/24
  # Réseau isolé pour les environnements de test
  testing_net:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.101.0/24

volumes:
  postgres_data:
  redis_data:
  nuclei_templates:
  trivy_db:

# ============================================================
# INFRASTRUCTURE
# ============================================================
services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-auditscan}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-auditscan_secret}
      POSTGRES_DB:       ${POSTGRES_DB:-auditscan_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - auditscan_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-auditscan} -d ${POSTGRES_DB:-auditscan_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Redis (pub/sub + Celery broker) ──────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - auditscan_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

# ============================================================
# SCANNER MICROSERVICES
# ============================================================

  # ── Nmap — Active Port Scanner ────────────────────────────────────────────
  nmap:
    build:
      context: ./nmap
    image: auditscan-nmap:dev
    restart: unless-stopped
    cap_add:
      - NET_RAW
      - NET_ADMIN
    networks:
      - auditscan_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Nuclei — Vulnerability Scanner ───────────────────────────────────────
  nuclei:
    build:
      context: ./nuclei
    image: auditscan-nuclei:dev
    restart: unless-stopped
    networks:
      - auditscan_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── OWASP ZAP — Web Application Scanner ──────────────────────────────────
  zap:
    build:
      context: ./zap
    image: auditscan-zap:dev
    restart: unless-stopped
    networks:
      - auditscan_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9002/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 240s

  # ── Subfinder + httpx — Asset Discovery ──────────────────────────────────
  subfinder:
    build:
      context: ./subfinder
    image: auditscan-subfinder:dev
    restart: unless-stopped
    networks:
      - auditscan_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Dalfox — XSS Detection ────────────────────────────────────────────────
  dalfox:
    build:
      context: ./dalfox
    image: auditscan-dalfox:dev
    restart: unless-stopped
    networks:
      - auditscan_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9004/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── FFUF — Endpoint/Directory Discovery ──────────────────────────────────
  ffuf:
    build:
      context: ./ffuf
    image: auditscan-ffuf:dev
    restart: unless-stopped
    networks:
      - auditscan_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9006/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── SQLMap — SQL Injection Assessment ────────────────────────────────────
  sqlmap:
    build:
      context: ./sqlmap
    image: auditscan-sqlmap:dev
    restart: unless-stopped
    networks:
      - auditscan_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9007/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── GitLeaks — Secrets Detection ─────────────────────────────────────────
  gitleaks:
    build:
      context: ./gitleaks
    image: auditscan-gitleaks:dev
    restart: unless-stopped
    networks:
      - auditscan_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9008/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Katana — Next-gen JS/SPA Web Crawler ─────────────────────────────────
  katana:
    build:
      context: ./katana
    image: auditscan-katana:dev
    restart: unless-stopped
    networks:
      - auditscan_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9009/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Nikto — Web Server Scanner ───────────────────────────────────────────
  nikto:
    build:
      context: ./nikto
    image: auditscan-nikto:dev
    restart: unless-stopped
    networks:
      - auditscan_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9010/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Wapiti — Web Application Auditor ─────────────────────────────────────
  wapiti:
    build:
      context: ./wapiti
    image: auditscan-wapiti:dev
    restart: unless-stopped
    networks:
      - auditscan_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9011/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

  # ── IDOR Tester — Broken Access Control / Cross-account Testing ──────────
  idor:
    build:
      context: ./idor
    image: auditscan-idor:dev
    restart: unless-stopped
    networks:
      - auditscan_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9012/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Trivy — Supply Chain / Container Scanner ──────────────────────────────
  trivy:
    build:
      context: ./trivy
    image: auditscan-trivy:dev
    restart: unless-stopped
    volumes:
      - trivy_db:/root/.cache/trivy
    networks:
      - auditscan_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9005/health"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 120s

# ============================================================
# BACKEND SERVICES
# ============================================================

  # ── Backend API (FastAPI) ─────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
    image: auditscan-backend:dev
    restart: unless-stopped
    env_file: .env
    dns:
      - 8.8.8.8
      - 1.1.1.1
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    environment:
      SUBFINDER_URL: http://subfinder:9003
      DALFOX_URL:    http://dalfox:9004
      TRIVY_URL:     http://trivy:9005
      FFUF_URL:      http://ffuf:9006
      SQLMAP_URL:    http://sqlmap:9007
      GITLEAKS_URL:  http://gitleaks:9008
      NIKTO_URL:     http://nikto:9010
      WAPITI_URL:    http://wapiti:9011
      IDOR_URL:      http://idor:9012
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - auditscan_net
    ports:
      - "8001:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Celery Worker FAST — priority + default queues ───────────────────────
  # Handles standard scans and priority retries
  # concurrency=4: up to 4 parallel scans
  worker:
    build:
      context: ./backend
    image: auditscan-worker:dev
    restart: unless-stopped
    command: >
      celery -A app.workers.celery_app worker
      --loglevel=info
      --concurrency=4
      -Q priority,default
      --hostname=worker-fast@%h
      --max-tasks-per-child=10
    env_file: .env
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      SUBFINDER_URL: http://subfinder:9003
      DALFOX_URL:    http://dalfox:9004
      TRIVY_URL:     http://trivy:9005
      FFUF_URL:      http://ffuf:9006
      SQLMAP_URL:    http://sqlmap:9007
      GITLEAKS_URL:  http://gitleaks:9008
      KATANA_URL:    http://katana:9009
      NIKTO_URL:     http://nikto:9010
      WAPITI_URL:    http://wapiti:9011
      IDOR_URL:      http://idor:9012
      WORKER_TYPE:   fast
    deploy:
      resources:
        limits:
          memory: 1536M
        reservations:
          memory: 256M
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - auditscan_net

  # ── Celery Worker SLOW — slow queue (long-running scans) ─────────────────
  # concurrency=2: ZAP + Nuclei are resource-heavy
  worker-slow:
    build:
      context: ./backend
    image: auditscan-worker:dev
    restart: unless-stopped
    command: >
      celery -A app.workers.celery_app worker
      --loglevel=info
      --concurrency=2
      -Q slow,default
      --hostname=worker-slow@%h
      --max-tasks-per-child=5
    env_file: .env
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      SUBFINDER_URL: http://subfinder:9003
      DALFOX_URL:    http://dalfox:9004
      TRIVY_URL:     http://trivy:9005
      FFUF_URL:      http://ffuf:9006
      SQLMAP_URL:    http://sqlmap:9007
      GITLEAKS_URL:  http://gitleaks:9008
      KATANA_URL:    http://katana:9009
      NIKTO_URL:     http://nikto:9010
      WAPITI_URL:    http://wapiti:9011
      IDOR_URL:      http://idor:9012
      WORKER_TYPE:   slow
    deploy:
      resources:
        limits:
          memory: 768M
        reservations:
          memory: 192M
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      worker:
        condition: service_started
    networks:
      - auditscan_net

  # ── Celery Beat (scheduled tasks) ────────────────────────────────────────
  beat:
    build:
      context: ./backend
    image: auditscan-beat:dev
    restart: unless-stopped
    command: celery -A app.workers.celery_app beat --loglevel=info
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - auditscan_net

  # ── Flower — Celery monitoring UI (queues + workers + tasks) ─────────────
  flower:
    build:
      context: ./backend
    image: auditscan-flower:dev
    restart: unless-stopped
    command: >
      celery -A app.workers.celery_app flower
      --port=5555
      --persistent=True
      --db=/tmp/flower.db
      --max_tasks=1000
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - auditscan_net
    ports:
      - "5555:5555"

  # ── Frontend (Next.js) ────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        - INTERNAL_API_URL=http://backend:8000
    image: auditscan-frontend:dev
    restart: unless-stopped
    env_file: .env
    environment:
      INTERNAL_API_URL: http://backend:8000
      HOSTNAME: "0.0.0.0"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - auditscan_net
    ports:
      - "3001:3000"

# ============================================================
# TESTING ENVIRONMENTS (profile: testing)
# Vulnerable apps intentionnellement pour tests defensifs.
# Lancer avec : docker compose --profile testing up
# ============================================================

  # ── OWASP Juice Shop ─────────────────────────────────────────────────────
  juiceshop:
    image: bkimminich/juice-shop:latest
    restart: unless-stopped
    profiles:
      - testing
    environment:
      - NODE_OPTIONS=--max-old-space-size=1536
    mem_limit: 2g
    memswap_limit: 2g
    cpus: 1.5
    networks:
      - auditscan_net
      - testing_net
    ports:
      - "3100:3000"
    labels:
      auditscan.testing: "true"
      auditscan.testing.app: "juice-shop"

  # ── DVWA ─────────────────────────────────────────────────────────────────
  dvwa:
    image: vulnerables/web-dvwa:latest
    restart: unless-stopped
    profiles:
      - testing
    networks:
      - auditscan_net
      - testing_net
    ports:
      - "3101:80"
    labels:
      auditscan.testing: "true"
      auditscan.testing.app: "dvwa"

  # ── WebGoat ───────────────────────────────────────────────────────────────
  webgoat:
    image: webgoat/webgoat:latest
    restart: unless-stopped
    profiles:
      - testing
    networks:
      - auditscan_net
      - testing_net
    ports:
      - "3102:8080"
    environment:
      - WEBGOAT_PORT=8080
      - WEBWOLF_PORT=9090
    labels:
      auditscan.testing: "true"
      auditscan.testing.app: "webgoat"
