version: "3.9"

networks:
  auditscan_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:

services:
  # ------------------------------------------------------------------ #
  #  PostgreSQL                                                          #
  # ------------------------------------------------------------------ #
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - auditscan_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ------------------------------------------------------------------ #
  #  Redis                                                               #
  # ------------------------------------------------------------------ #
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - auditscan_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ------------------------------------------------------------------ #
  #  Nmap sidecar                                                        #
  # ------------------------------------------------------------------ #
  nmap:
    image: ghcr.io/${REGISTRY_OWNER}/auditscan-nmap:${IMAGE_TAG:-latest}
    restart: unless-stopped
    networks:
      - auditscan_net

  # ------------------------------------------------------------------ #
  #  Backend API                                                         #
  # ------------------------------------------------------------------ #
  backend:
    image: ghcr.io/${REGISTRY_OWNER}/auditscan-backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - auditscan_net
    ports:
      - "8000:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ------------------------------------------------------------------ #
  #  Celery Worker                                                       #
  # ------------------------------------------------------------------ #
  worker:
    image: ghcr.io/${REGISTRY_OWNER}/auditscan-backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=4
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nmap:
        condition: service_started
    networks:
      - auditscan_net
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  # ------------------------------------------------------------------ #
  #  Frontend                                                            #
  # ------------------------------------------------------------------ #
  frontend:
    image: ghcr.io/${REGISTRY_OWNER}/auditscan-frontend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8000}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - auditscan_net
    ports:
      - "3001:3000"
