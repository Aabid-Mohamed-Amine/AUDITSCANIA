version: "3.9"

networks:
  auditscan_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:

services:
  # ------------------------------------------------------------------ #
  #  PostgreSQL                                                          #
  # ------------------------------------------------------------------ #
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-auditscan}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-auditscan_secret}
      POSTGRES_DB: ${POSTGRES_DB:-auditscan_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - auditscan_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-auditscan} -d ${POSTGRES_DB:-auditscan_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  # ------------------------------------------------------------------ #
  #  Redis                                                               #
  # ------------------------------------------------------------------ #
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - auditscan_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "6379:6379"

  # ------------------------------------------------------------------ #
  #  Nmap sidecar                                                        #
  # ------------------------------------------------------------------ #
  nmap:
    build:
      context: ./nmap
      dockerfile: Dockerfile
    image: auditscan-nmap:latest
    restart: unless-stopped
    networks:
      - auditscan_net

  # ------------------------------------------------------------------ #
  #  Backend API                                                         #
  # ------------------------------------------------------------------ #
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://auditscan:auditscan_secret@postgres:5432/auditscan_db}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - auditscan_net
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ------------------------------------------------------------------ #
  #  Celery Worker                                                       #
  # ------------------------------------------------------------------ #
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=4
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://auditscan:auditscan_secret@postgres:5432/auditscan_db}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nmap:
        condition: service_started
    networks:
      - auditscan_net
    volumes:
      - ./backend:/app
      - /var/run/docker.sock:/var/run/docker.sock

  # ------------------------------------------------------------------ #
  #  Frontend                                                            #
  # ------------------------------------------------------------------ #
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8000}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - auditscan_net
    ports:
      - "3001:3000"
